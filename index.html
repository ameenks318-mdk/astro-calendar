<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Astronomical Calendar — Celestial events, scientist birthdays, achievements, and memorial days in physics and chemistry.">
    <title>Astronomical Calendar — Baselius College, Kottayam</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Astro Calendar">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        /* ── RESET & BASE ── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:#f8f9fb;
            color:#1a1a2e;
            min-height:100vh;
            -webkit-font-smoothing:antialiased;
        }

        /* ── LAYOUT ── */
        .app {
            display:flex;
            height:100vh;
            overflow:hidden;
        }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width:320px;
            min-width:320px;
            background:#fff;
            border-right:1px solid #e8eaed;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .sidebar-header {
            padding:20px 20px 16px;
            border-bottom:1px solid #e8eaed;
            background:#fff;
        }

        .college-brand {
            display:flex;
            flex-direction:column;
            align-items:center;
            text-align:center;
            margin-bottom:14px;
            padding-bottom:14px;
            border-bottom:1px solid #f0f1f3;
        }

        .college-logo {
            width:72px;
            height:72px;
            border-radius:50%;
            object-fit:contain;
            margin-bottom:10px;
            border:2px solid #e8eaed;
            padding:4px;
            background:#fff;
        }

        .college-name {
            font-size:.88rem;
            font-weight:800;
            color:#1a1a2e;
            letter-spacing:.3px;
            line-height:1.3;
            text-transform:uppercase;
        }

        .college-sub {
            font-size:.65rem;
            font-weight:500;
            color:#8b8fa3;
            margin-top:3px;
            letter-spacing:.3px;
        }

        .college-dept {
            font-size:.62rem;
            font-weight:600;
            color:#4f46e5;
            margin-top:6px;
            text-transform:uppercase;
            letter-spacing:1px;
            background:rgba(79,70,229,.06);
            padding:4px 12px;
            border-radius:12px;
        }

        /* Search */
        .search-box {
            position:relative;
            margin-top:12px;
        }

        .search-box input {
            width:100%;
            padding:9px 12px 9px 36px;
            border:1px solid #e8eaed;
            border-radius:8px;
            font-size:.82rem;
            font-family:inherit;
            color:#1a1a2e;
            background:#f8f9fb;
            outline:none;
            transition:.2s;
        }

        .search-box input:focus {
            border-color:#4f46e5;
            background:#fff;
            box-shadow:0 0 0 3px rgba(79,70,229,.08);
        }

        .search-box input::placeholder { color:#b0b3c1; }

        .search-box .s-icon {
            position:absolute;
            left:10px;
            top:50%;
            transform:translateY(-50%);
            font-size:18px;
            color:#b0b3c1;
        }

        .search-box .clear {
            position:absolute;
            right:8px;
            top:50%;
            transform:translateY(-50%);
            background:none;
            border:none;
            color:#b0b3c1;
            cursor:pointer;
            font-size:16px;
            display:none;
            font-family:'Material Symbols Rounded';
        }

        .search-box .clear.show { display:block; }

        /* Filters */
        .filters {
            padding:14px 24px;
            border-bottom:1px solid #f0f1f3;
        }

        .filters-title {
            font-size:.65rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:1px;
            color:#8b8fa3;
            margin-bottom:8px;
        }

        .filter-list {
            display:flex;
            flex-direction:column;
            gap:3px;
        }

        .filter-item {
            display:flex;
            align-items:center;
            gap:8px;
            padding:6px 8px;
            border-radius:6px;
            cursor:pointer;
            transition:.15s;
            font-size:.78rem;
            font-weight:500;
            color:#3d3d56;
            user-select:none;
        }

        .filter-item:hover { background:#f4f5f7; }
        .filter-item.off { opacity:.4; }

        .filter-dot {
            width:10px;
            height:10px;
            border-radius:3px;
            flex-shrink:0;
        }

        .filter-count {
            margin-left:auto;
            font-size:.65rem;
            font-weight:600;
            color:#b0b3c1;
            background:#f4f5f7;
            padding:1px 6px;
            border-radius:4px;
        }

        /* Event List */
        .event-list-section {
            flex:1;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }

        .event-list-header {
            padding:14px 24px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            border-bottom:1px solid #f0f1f3;
        }

        .event-list-header h2 {
            font-size:.82rem;
            font-weight:700;
            color:#1a1a2e;
        }

        .event-list-header .badge {
            font-size:.65rem;
            font-weight:700;
            color:#4f46e5;
            background:rgba(79,70,229,.08);
            padding:2px 8px;
            border-radius:10px;
        }

        .event-list {
            flex:1;
            overflow-y:auto;
            padding:8px 16px 16px;
        }

        .event-list::-webkit-scrollbar { width:4px; }
        .event-list::-webkit-scrollbar-track { background:transparent; }
        .event-list::-webkit-scrollbar-thumb { background:#e0e1e5; border-radius:2px; }

        .ev-card {
            padding:10px 12px;
            border-radius:8px;
            cursor:pointer;
            transition:.15s;
            border-left:3px solid transparent;
            margin-bottom:2px;
        }

        .ev-card:hover { background:#f4f5f7; }

        .ev-card .ev-date {
            font-size:.6rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:.8px;
            margin-bottom:2px;
        }

        .ev-card .ev-title {
            font-size:.8rem;
            font-weight:600;
            color:#1a1a2e;
            line-height:1.35;
            margin-bottom:2px;
        }

        .ev-card .ev-desc {
            font-size:.7rem;
            color:#8b8fa3;
            line-height:1.4;
        }

        .ev-empty {
            text-align:center;
            padding:40px 20px;
            color:#b0b3c1;
            font-size:.82rem;
        }

        .ev-empty span { font-size:36px; display:block; margin-bottom:8px; }

        /* ── MAIN CONTENT ── */
        .main {
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            background:#fff;
        }

        /* Top Bar */
        .topbar {
            display:flex;
            align-items:center;
            padding:14px 28px;
            border-bottom:1px solid #e8eaed;
            gap:16px;
            flex-shrink:0;
        }

        .nav-btn {
            width:34px;
            height:34px;
            border:1px solid #e0e1e5;
            border-radius:8px;
            background:#fff;
            color:#4a4a5a;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            transition:.15s;
            font-family:'Material Symbols Rounded';
        }

        .nav-btn:hover { background:#f4f5f7; border-color:#c8c9d0; }

        .month-label {
            font-size:1.3rem;
            font-weight:700;
            color:#1a1a2e;
            min-width:220px;
            letter-spacing:-.5px;
        }

        .today-btn {
            padding:7px 16px;
            border:1px solid #e0e1e5;
            border-radius:8px;
            background:#fff;
            color:#4f46e5;
            font-size:.78rem;
            font-weight:600;
            cursor:pointer;
            transition:.15s;
            font-family:inherit;
        }

        .today-btn:hover { background:#4f46e5; color:#fff; border-color:#4f46e5; }

        .stats-pills {
            display:flex;
            gap:6px;
            margin-left:auto;
        }

        .stat-pill {
            display:flex;
            align-items:center;
            gap:4px;
            padding:5px 10px;
            border-radius:6px;
            font-size:.68rem;
            font-weight:600;
            background:#f8f9fb;
            border:1px solid #f0f1f3;
        }

        .stat-pill .sp-dot {
            width:7px;
            height:7px;
            border-radius:2px;
        }

        /* ── CALENDAR GRID ── */
        .calendar-wrap {
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .weekdays {
            display:grid;
            grid-template-columns:repeat(7,1fr);
            border-bottom:1px solid #e8eaed;
            flex-shrink:0;
        }

        .weekdays div {
            padding:10px 0;
            text-align:center;
            font-size:.7rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:1px;
            color:#8b8fa3;
        }

        .cal-grid {
            flex:1;
            display:grid;
            grid-template-columns:repeat(7,1fr);
            grid-auto-rows:1fr;
            overflow:hidden;
        }

        .cal-cell {
            border-right:1px solid #f0f1f3;
            border-bottom:1px solid #f0f1f3;
            padding:6px 8px;
            cursor:pointer;
            transition:.1s;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            min-height:0;
        }

        .cal-cell:nth-child(7n) { border-right:none; }
        .cal-cell:hover { background:#f8f9fb; }

        .cal-cell.other { opacity:.3; pointer-events:none; }

        .cal-cell.today .cell-day {
            background:#4f46e5;
            color:#fff;
            border-radius:50%;
            width:28px;
            height:28px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .cal-cell.selected {
            background:#eef2ff;
        }

        .cal-cell.selected .cell-day:not(.today .cell-day) {
            color:#4f46e5;
            font-weight:800;
        }

        .cell-day {
            font-size:.82rem;
            font-weight:600;
            color:#3d3d56;
            margin-bottom:4px;
            flex-shrink:0;
            width:28px;
            height:28px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .cell-events {
            display:flex;
            flex-direction:column;
            gap:2px;
            flex:1;
            overflow:hidden;
        }

        .cell-ev {
            font-size:.62rem;
            font-weight:500;
            padding:1px 5px;
            border-radius:3px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            line-height:1.5;
            flex-shrink:0;
        }

        .cell-more {
            font-size:.58rem;
            font-weight:600;
            color:#8b8fa3;
            padding:1px 5px;
        }

        /* Event type colors — light & clean */
        .t-astro { border-left-color:#4f46e5; }
        .t-astro .ev-date { color:#4f46e5; }
        .c-astro { background:#eef2ff; color:#4338ca; }
        .d-astro { background:#4f46e5; }

        .t-birthday { border-left-color:#d97706; }
        .t-birthday .ev-date { color:#d97706; }
        .c-birthday { background:#fef9ee; color:#b45309; }
        .d-birthday { background:#d97706; }

        .t-memorial { border-left-color:#dc2626; }
        .t-memorial .ev-date { color:#dc2626; }
        .c-memorial { background:#fef2f2; color:#b91c1c; }
        .d-memorial { background:#dc2626; }

        .t-achievement { border-left-color:#059669; }
        .t-achievement .ev-date { color:#059669; }
        .c-achievement { background:#ecfdf5; color:#047857; }
        .d-achievement { background:#059669; }

        .t-moon { border-left-color:#7c3aed; }
        .t-moon .ev-date { color:#7c3aed; }
        .c-moon { background:#f5f3ff; color:#6d28d9; }
        .d-moon { background:#7c3aed; }

        .t-eclipse { border-left-color:#ea580c; }
        .t-eclipse .ev-date { color:#ea580c; }
        .c-eclipse { background:#fff7ed; color:#c2410c; }
        .d-eclipse { background:#ea580c; }

        .t-intl { border-left-color:#0284c7; }
        .t-intl .ev-date { color:#0284c7; }
        .c-intl { background:#f0f9ff; color:#0369a1; }
        .d-intl { background:#0284c7; }

        /* ── MODAL ── */
        .modal-overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.3);
            backdrop-filter:blur(4px);
            z-index:1000;
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            visibility:hidden;
            transition:.25s;
        }

        .modal-overlay.on { opacity:1; visibility:visible; }

        .modal-box {
            background:#fff;
            border-radius:16px;
            padding:0;
            max-width:520px;
            width:92%;
            max-height:80vh;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            transform:translateY(12px) scale(.97);
            transition:.25s;
            box-shadow:0 20px 60px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
        }

        .modal-overlay.on .modal-box { transform:translateY(0) scale(1); }

        .modal-top {
            padding:24px 28px 16px;
            display:flex;
            align-items:flex-start;
            gap:14px;
            border-bottom:1px solid #f0f1f3;
        }

        .modal-icon {
            font-size:32px;
            flex-shrink:0;
            line-height:1;
        }

        .modal-top-text { flex:1; }

        .modal-title {
            font-size:1.05rem;
            font-weight:700;
            color:#1a1a2e;
            line-height:1.35;
            margin-bottom:4px;
        }

        .modal-type {
            font-size:.7rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:.5px;
        }

        .modal-close {
            width:32px;
            height:32px;
            border:1px solid #e8eaed;
            border-radius:8px;
            background:#fff;
            color:#8b8fa3;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            transition:.15s;
            flex-shrink:0;
            font-family:'Material Symbols Rounded';
        }

        .modal-close:hover { background:#f4f5f7; color:#1a1a2e; }

        .modal-body {
            padding:20px 28px 28px;
            overflow-y:auto;
        }

        .modal-body p {
            font-size:.88rem;
            line-height:1.75;
            color:#4a4a5a;
        }

        .modal-field {
            margin-top:14px;
            padding-top:14px;
            border-top:1px solid #f0f1f3;
            font-size:.78rem;
            color:#8b8fa3;
        }

        .modal-field strong { color:#3d3d56; font-weight:600; }

        /* ── RESPONSIVE ── */

        /* Mobile menu toggle button */
        .mobile-menu-btn {
            display:none;
            width:36px;
            height:36px;
            border:1px solid #e0e1e5;
            border-radius:8px;
            background:#fff;
            color:#4a4a5a;
            cursor:pointer;
            align-items:center;
            justify-content:center;
            font-size:20px;
            font-family:'Material Symbols Rounded';
            flex-shrink:0;
            transition:.15s;
        }
        .mobile-menu-btn:hover { background:#f4f5f7; }

        /* Sidebar overlay for mobile */
        .sidebar-overlay {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.4);
            z-index:998;
            opacity:0;
            transition:opacity .3s;
        }
        .sidebar-overlay.show {
            opacity:1;
        }

        /* Tablet */
        @media (max-width:1024px) {
            .sidebar { display:none; }
            .mobile-menu-btn { display:flex; }
            .sidebar.mobile-open {
                display:flex;
                position:fixed;
                left:0; top:0; bottom:0;
                z-index:999;
                width:320px;
                box-shadow:4px 0 24px rgba(0,0,0,.15);
                animation:slideIn .25s ease;
            }
            .sidebar-overlay.show { display:block; }
            .stats-pills { display:none; }
        }

        @keyframes slideIn {
            from { transform:translateX(-100%); }
            to { transform:translateX(0); }
        }

        /* Mobile phones */
        @media (max-width:768px) {
            .app {
                flex-direction:column;
                height:100vh;
                height:100dvh;
            }

            .main { overflow:auto; }

            /* Topbar compact */
            .topbar {
                padding:10px 12px;
                gap:8px;
                flex-wrap:nowrap;
                position:sticky;
                top:0;
                background:#fff;
                z-index:10;
            }

            .nav-btn {
                width:32px; height:32px;
                min-width:32px;
                font-size:16px;
                border-radius:6px;
            }

            .month-label {
                font-size:.95rem;
                min-width:auto;
                flex:1;
                letter-spacing:-.3px;
            }

            .today-btn {
                padding:6px 10px;
                font-size:.72rem;
                border-radius:6px;
            }

            .stats-pills { display:none; }

            /* Weekday headers */
            .weekdays div {
                padding:8px 0;
                font-size:.6rem;
                letter-spacing:.5px;
            }

            /* Calendar grid — scrollable so all weeks are reachable */
            .calendar-wrap {
                overflow:auto;
                flex:1;
            }

            .cal-grid {
                overflow:visible;
                grid-auto-rows:auto;
            }

            /* Calendar cells — show event text like desktop, not dots */
            .cal-cell {
                padding:3px 2px;
                min-height:65px;
                overflow:hidden;
            }

            .cell-day {
                font-size:.72rem;
                width:22px; height:22px;
                margin:0 auto 2px auto;
            }

            .cal-cell.today .cell-day {
                width:22px; height:22px;
            }

            /* Keep events as text bars — like desktop but smaller */
            .cell-events {
                display:flex;
                flex-direction:column;
                gap:1px;
                overflow:hidden;
                flex:1;
            }

            .cell-ev {
                font-size:.5rem;
                font-weight:500;
                padding:1px 3px;
                border-radius:2px;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
                line-height:1.4;
                flex-shrink:0;
            }

            /* Show only 1 event per cell; hide the rest via JS '+N more' */
            .cell-ev:nth-child(n+2) {
                display:none;
            }

            .cell-more {
                font-size:.48rem;
                font-weight:600;
                color:#8b8fa3;
                padding:0 3px;
                line-height:1.3;
            }

            /* Sidebar mobile full width */
            .sidebar.mobile-open {
                width:85vw;
                max-width:320px;
            }

            /* Modal full screen on mobile */
            .modal-box {
                width:95vw;
                max-width:95vw;
                max-height:85vh;
                border-radius:16px;
            }

            .modal-top { padding:16px; }
            .modal-body { padding:16px; }
            .modal-body p { font-size:.82rem; }

            /* College brand compact */
            .college-logo { width:56px; height:56px; }
            .college-name { font-size:.8rem; }
        }

        /* Very small phones */
        @media (max-width:380px) {
            .topbar { padding:8px 8px; gap:6px; }
            .month-label { font-size:.85rem; }
            .today-btn { padding:5px 8px; font-size:.68rem; }
            .cal-cell { padding:3px 2px; min-height:46px; }
            .cell-day { font-size:.65rem; width:20px; height:20px; }
            .cal-cell.today .cell-day { width:20px; height:20px; }
            .cell-ev { width:5px; height:5px; }
            .weekdays div { font-size:.55rem; padding:6px 0; }
        }

        /* ── ADMIN PANEL ── */
        .admin-btn {
            width:34px;
            height:34px;
            border:1px solid #e0e1e5;
            border-radius:8px;
            background:#fff;
            color:#8b8fa3;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            transition:.15s;
            font-family:'Material Symbols Rounded';
            flex-shrink:0;
            margin-left:8px;
        }
        .admin-btn:hover { background:#f4f5f7; color:#4f46e5; border-color:#c8c9d0; }

        .admin-overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.35);
            backdrop-filter:blur(4px);
            z-index:2000;
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            visibility:hidden;
            transition:.25s;
        }
        .admin-overlay.on { opacity:1; visibility:visible; }

        .admin-panel {
            background:#fff;
            border-radius:16px;
            max-width:560px;
            width:94%;
            max-height:85vh;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            transform:translateY(12px) scale(.97);
            transition:.25s;
            box-shadow:0 20px 60px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.04);
        }
        .admin-overlay.on .admin-panel { transform:translateY(0) scale(1); }

        .admin-panel-header {
            padding:20px 24px 16px;
            border-bottom:1px solid #e8eaed;
            display:flex;
            align-items:center;
            justify-content:space-between;
        }
        .admin-panel-header h2 {
            font-size:1rem;
            font-weight:700;
            color:#1a1a2e;
            display:flex;
            align-items:center;
            gap:8px;
        }
        .admin-panel-header h2 span { font-size:20px; color:#4f46e5; }

        .admin-panel-body {
            padding:20px 24px;

{m:2,d:11,t:'birthday',i:'🎂',n:'Josiah Willard Gibbs — Born 1839',x:'Founded chemical thermodynamics and statistical mechanics. Einstein called him the greatest American scientist.',f:'Thermodynamics'},
{m:2,d:14,t:'birthday',i:'🎂',n:'Fritz Zwicky — Born 1898',x:'First proposed dark matter (1933). Also predicted neutron stars and gravitational lensing.',f:'Astrophysics'},
{m:2,d:15,t:'birthday',i:'🎂',n:'Galileo Galilei — Born 1564',x:'"Father of Modern Science." Telescope, Jupiter\'s moons, heliocentrism, kinematics. Prosecuted by the Inquisition.',f:'Astronomy/Physics'},
{m:2,d:17,t:'birthday',i:'🎂',n:'Otto Stern — Born 1888',x:'Nobel 1943 for molecular beam method. Stern-Gerlach experiment proved space quantization.',f:'Experimental Physics'},
{m:2,d:20,t:'birthday',i:'🎂',n:'Ludwig Boltzmann — Born 1844',x:'Statistical mechanics and the Boltzmann equation. Epitaph: S = k log W. The Boltzmann constant k.',f:'Statistical Mechanics'},
{m:2,d:22,t:'birthday',i:'🎂',n:'Heinrich Hertz — Born 1857',x:'Proved electromagnetic waves exist (1887), confirming Maxwell. The hertz (Hz) unit. Died at 36.',f:'Electromagnetism'},
{m:2,d:28,t:'birthday',i:'🎂',n:'Linus Pauling — Born 1901',x:'Only person to win 2 unshared Nobels: Chemistry (1954) and Peace (1962). Founded molecular biology.',f:'Chemistry'},
{m:3,d:14,t:'birthday',i:'🎂',n:'Albert Einstein — Born 1879',x:'Special & general relativity, E=mc², photoelectric effect (Nobel 1921), Brownian motion. Reshaped space, time, and gravity.',f:'Theoretical Physics'},
{m:3,d:16,t:'birthday',i:'🎂',n:'Georg Ohm — Born 1789',x:'Ohm\'s Law: V = IR. The ohm (Ω) unit of resistance.',f:'Electricity'},
{m:3,d:21,t:'birthday',i:'🎂',n:'Joseph Fourier — Born 1768',x:'Fourier analysis — decomposing functions into sine waves. Fundamental to signal processing and quantum mechanics.',f:'Mathematical Physics'},
{m:3,d:23,t:'birthday',i:'🎂',n:'Emmy Noether — Born 1882',x:'Noether\'s theorem: every symmetry = a conservation law. Einstein called her a genius.',f:'Mathematical Physics'},
{m:3,d:28,t:'birthday',i:'🎂',n:'Alexander Friedmann — Born 1888',x:'Derived Friedmann equations from GR showing the universe must be expanding — before Hubble confirmed it.',f:'Cosmology'},
{m:3,d:31,t:'birthday',i:'🎂',n:'Robert Bunsen — Born 1811',x:'Bunsen burner, discovered cesium and rubidium, pioneered emission spectroscopy with Kirchhoff.',f:'Chemistry'},
{m:4,d:15,t:'birthday',i:'🎂',n:'Leonhard Euler — Born 1707',x:'Euler\'s identity (e^iπ+1=0), fluid dynamics, optics, rigid body mechanics. Most prolific mathematician ever.',f:'Mathematical Physics'},
{m:4,d:22,t:'birthday',i:'🎂',n:'J. Robert Oppenheimer — Born 1904',x:'"Father of the Atomic Bomb." Led the Manhattan Project. Quoted the Bhagavad Gita after Trinity test.',f:'Nuclear Physics'},
{m:4,d:23,t:'birthday',i:'🎂',n:'Max Planck — Born 1858',x:'Originated quantum theory (1900). h = 6.626×10⁻³⁴ J·s. Nobel 1918.',f:'Quantum Physics'},
{m:4,d:25,t:'birthday',i:'🎂',n:'Wolfgang Pauli — Born 1900',x:'Pauli Exclusion Principle. Predicted the neutrino (1930). Nobel 1945. Famous "Pauli effect."',f:'Quantum Mechanics'},
{m:4,d:29,t:'birthday',i:'🎂',n:'Henri Poincaré — Born 1854',x:'Chaos theory, special relativity foundations, topology. "The last universal mathematician."',f:'Mathematical Physics'},
{m:4,d:30,t:'birthday',i:'🎂',n:'Carl Friedrich Gauss — Born 1777',x:'"Prince of Mathematicians." Magnetism (gauss unit), number theory, statistics (Gaussian distribution).',f:'Mathematics/Physics'},
{m:5,d:1,t:'birthday',i:'🎂',n:'Glenn Seaborg — Born 1912',x:'Discovered 10 transuranium elements. Nobel 1951. Element 106 = Seaborgium — named while alive!',f:'Nuclear Chemistry'},
{m:5,d:7,t:'birthday',i:'🎂',n:'Pyotr Kapitsa — Born 1894',x:'Discovered superfluidity in helium-4. Nobel 1978. Low-temperature physics pioneer.',f:'Condensed Matter'},
{m:5,d:11,t:'birthday',i:'🎂',n:'Richard Feynman — Born 1918',x:'Feynman diagrams, QED, path integrals, nanotechnology pioneer. Nobel 1965. "What I cannot create, I do not understand."',f:'Quantum Electrodynamics'},
{m:5,d:12,t:'birthday',i:'🎂',n:'Dorothy Hodgkin — Born 1910',x:'X-ray crystallography. Structures of penicillin, vitamin B12, insulin. Nobel Chemistry 1964.',f:'Crystallography'},
{m:5,d:16,t:'birthday',i:'🎂',n:'Maria Goeppert Mayer — Born 1906',x:'Nuclear shell model. Second woman to win Nobel in Physics (1963).',f:'Nuclear Physics'},
{m:5,d:23,t:'birthday',i:'🎂',n:'John Bardeen — Born 1908',x:'Only person to win 2 Nobel Prizes in Physics: transistor (1956) and superconductivity (1972).',f:'Solid State Physics'},
{m:5,d:24,t:'birthday',i:'🎂',n:'Daniel Gabriel Fahrenheit — Born 1686',x:'Invented the mercury thermometer and the Fahrenheit temperature scale.',f:'Thermometry'},
{m:5,d:27,t:'birthday',i:'🎂',n:'Rachel Carson — Born 1907',x:'"Silent Spring" (1962) launched the environmental movement and the EPA.',f:'Environmental Chemistry'},
{m:5,d:31,t:'birthday',i:'🎂',n:'Julius Robert von Mayer — Born 1814',x:'First formulated conservation of energy (1842). Calculated the mechanical equivalent of heat.',f:'Thermodynamics'},
{m:6,d:5,t:'birthday',i:'🎂',n:'John Couch Adams — Born 1819',x:'Independently predicted Neptune\'s position through mathematics.',f:'Celestial Mechanics'},
{m:6,d:8,t:'birthday',i:'🎂',n:'Francis Crick — Born 1916',x:'Co-discovered DNA\'s double helix with Watson, using Franklin\'s crystallography data. Nobel 1962.',f:'Biophysics'},
{m:6,d:13,t:'birthday',i:'🎂',n:'James Clerk Maxwell — Born 1831',x:'Unified electricity, magnetism, optics in Maxwell\'s equations. Predicted EM waves. Statistical mechanics pioneer.',f:'Electrodynamics'},
{m:6,d:19,t:'birthday',i:'🎂',n:'Blaise Pascal — Born 1623',x:'Pascal\'s law (pressure in fluids), Pascal\'s triangle, the Pascaline calculator. The pascal (Pa) unit.',f:'Fluid Mechanics'},
{m:6,d:22,t:'birthday',i:'🎂',n:'Hermann Minkowski — Born 1864',x:'Developed spacetime geometry — mathematical framework for special relativity.',f:'Mathematical Physics'},
{m:6,d:27,t:'birthday',i:'🎂',n:'Lord Kelvin — Born 1824',x:'Laws of Thermodynamics, absolute zero. Laid transatlantic telegraph cable. The kelvin (K) unit.',f:'Thermodynamics'},
{m:6,d:28,t:'birthday',i:'🎂',n:'Henri Becquerel — Born 1852',x:'Discovered radioactivity (1896). Shared 1903 Nobel with the Curies. The becquerel (Bq) unit.',f:'Radioactivity'},
{m:6,d:30,t:'birthday',i:'🎂',n:'Ahmed Zewail — Born 1946',x:'Founded femtochemistry — observing reactions at 10⁻¹⁵ seconds. Nobel Chemistry 1999.',f:'Femtochemistry'},
{m:7,d:1,t:'birthday',i:'🎂',n:'Gottfried Wilhelm Leibniz — Born 1646',x:'Independently invented calculus, conceived kinetic energy, developed binary arithmetic.',f:'Mathematics/Physics'},
{m:7,d:2,t:'birthday',i:'🎂',n:'Hans Bethe — Born 1906',x:'Discovered nuclear reactions powering stars (CNO cycle). Nobel 1967. Worked on the bomb and disarmament.',f:'Nuclear Physics'},
{m:7,d:10,t:'birthday',i:'🎂',n:'Nikola Tesla — Born 1856',x:'AC power system, Tesla coil, radio technology. 300+ patents. The tesla (T) magnetic unit.',f:'Electrical Engineering'},
{m:7,d:17,t:'birthday',i:'🎂',n:'Georges Lemaître — Born 1894',x:'Proposed the Big Bang theory (1927). Derived Hubble\'s law two years before Hubble.',f:'Cosmology'},
{m:7,d:18,t:'birthday',i:'🎂',n:'Hendrik Lorentz — Born 1853',x:'Lorentz transformations, fundamental to special relativity. Nobel 1902. Mentor to Einstein.',f:'Theoretical Physics'},
{m:7,d:22,t:'birthday',i:'🎂',n:'Friedrich Bessel — Born 1784',x:'First accurate stellar distance measurement (parallax). Bessel functions are fundamental in physics.',f:'Astronomy'},
{m:7,d:25,t:'birthday',i:'🎂',n:'Rosalind Franklin — Born 1920',x:'Photo 51 was crucial for DNA\'s double helix discovery. Died at 37 of ovarian cancer.',f:'Crystallography'},
{m:8,d:1,t:'birthday',i:'🎂',n:'Maria Mitchell — Born 1818',x:'First American woman astronomer. Discovered a comet (1847). Pioneered women in science.',f:'Astronomy'},
{m:8,d:6,t:'birthday',i:'🎂',n:'Alexander Fleming — Born 1881',x:'Discovered penicillin (1928) — the first antibiotic. Nobel 1945. Revolutionized medicine.',f:'Biochemistry'},
{m:8,d:8,t:'birthday',i:'🎂',n:'Paul Dirac — Born 1902',x:'Dirac equation predicted antimatter. Nobel 1933. "God used beautiful mathematics in creating the world."',f:'Quantum Mechanics'},
{m:8,d:9,t:'birthday',i:'🎂',n:'Amedeo Avogadro — Born 1776',x:'Avogadro\'s law and the concept of molecules. Avogadro\'s number: 6.022 × 10²³.',f:'Chemistry'},
{m:8,d:12,t:'birthday',i:'🎂',n:'Erwin Schrödinger — Born 1887',x:'Schrödinger equation: the fundamental equation of quantum mechanics. Schrödinger\'s cat. Nobel 1933.',f:'Quantum Mechanics'},
{m:8,d:13,t:'birthday',i:'🎂',n:'Anders Ångström — Born 1814',x:'Founded spectroscopy. The Ångström unit (Å = 10⁻¹⁰ m) for atomic scales.',f:'Spectroscopy'},
{m:8,d:15,t:'birthday',i:'🎂',n:'Louis de Broglie — Born 1892',x:'Wave-particle duality: λ = h/p. Every particle has a wavelength. Nobel 1929.',f:'Quantum Physics'},
{m:8,d:20,t:'birthday',i:'🎂',n:'Paul Ehrlich — Born 1854',x:'Developed the "magic bullet" concept in pharmacology. Pioneer of chemotherapy. Nobel 1908.',f:'Medicinal Chemistry'},
{m:8,d:26,t:'birthday',i:'🎂',n:'Antoine Lavoisier — Born 1743',x:'"Father of Modern Chemistry." Named oxygen & hydrogen. Conservation of mass. Guillotined in the Revolution.',f:'Chemistry'},
{m:8,d:30,t:'birthday',i:'🎂',n:'Ernest Rutherford — Born 1871',x:'"Father of Nuclear Physics." Discovered the nucleus, proton. Nobel 1908. Element 104 = Rutherfordium.',f:'Nuclear Physics'},
{m:8,d:31,t:'birthday',i:'🎂',n:'Hermann von Helmholtz — Born 1821',x:'Conservation of energy, Helmholtz free energy, ophthalmoscope, acoustics/optics.',f:'Thermodynamics'},
{m:9,d:5,t:'birthday',i:'🎂',n:'John Dalton — Born 1766',x:'Modern atomic theory (1803). Law of multiple proportions. Studied color blindness (Daltonism).',f:'Chemistry'},
{m:9,d:15,t:'birthday',i:'🎂',n:'Murray Gell-Mann — Born 1929',x:'Quark model, Eightfold Way. Named "quarks" from Joyce\'s Finnegans Wake. Nobel 1969.',f:'Particle Physics'},
{m:9,d:17,t:'birthday',i:'🎂',n:'Bernhard Riemann — Born 1826',x:'Riemannian geometry became the language of general relativity. Riemann hypothesis: most famous unsolved problem.',f:'Mathematical Physics'},
{m:9,d:18,t:'birthday',i:'🎂',n:'Léon Foucault — Born 1819',x:'Proved Earth\'s rotation with his pendulum (1851). Measured the speed of light. Invented the gyroscope.',f:'Experimental Physics'},
{m:9,d:22,t:'birthday',i:'🎂',n:'Michael Faraday — Born 1791',x:'Electromagnetic induction, Faraday cage, diamagnetism, electrolysis laws. Self-taught genius. The farad (F) unit.',f:'Electromagnetism'},
{m:9,d:25,t:'birthday',i:'🎂',n:'Jean-Baptiste Perrin — Born 1870',x:'Proved atoms exist by studying Brownian motion. Nobel 1926.',f:'Atomic Physics'},
{m:9,d:29,t:'birthday',i:'🎂',n:'Enrico Fermi — Born 1901',x:'First nuclear reactor (1942). Beta decay theory, Fermi statistics, Fermi paradox. Nobel 1938. Element 100 = Fermium.',f:'Nuclear Physics'},
{m:10,d:5,t:'birthday',i:'🎂',n:'Robert Goddard — Born 1882',x:'"Father of Modern Rocketry." First liquid-fueled rocket (1926). 214 patents. NASA\'s Goddard Center.',f:'Rocket Physics'},
{m:10,d:7,t:'birthday',i:'🎂',n:'Niels Bohr — Born 1885',x:'Bohr atomic model, Copenhagen interpretation of QM. Nobel 1922. Element 107 = Bohrium.',f:'Atomic Physics'},
{m:10,d:10,t:'birthday',i:'🎂',n:'Henry Cavendish — Born 1731',x:'Discovered hydrogen. Measured Earth\'s density. Determined gravitational constant G.',f:'Chemistry/Physics'},
{m:10,d:15,t:'birthday',i:'🎂',n:'Evangelista Torricelli — Born 1608',x:'Invented the barometer (1643). Torricelli\'s theorem in fluid dynamics.',f:'Fluid Physics'},
{m:10,d:19,t:'birthday',i:'🎂',n:'Subrahmanyan Chandrasekhar — Born 1910',x:'Chandrasekhar limit (1.4 M☉) for white dwarfs. Nobel 1983.',f:'Astrophysics'},
{m:10,d:21,t:'birthday',i:'🎂',n:'Alfred Nobel — Born 1833',x:'Invented dynamite (1867). His fortune established the Nobel Prizes.',f:'Chemistry'},
{m:10,d:25,t:'birthday',i:'🎂',n:'Henry Moseley — Born 1887',x:'Used X-rays to determine atomic numbers. Proved atomic number orders the Periodic Table. Killed at Gallipoli at 27.',f:'Atomic Physics'},
{m:10,d:31,t:'birthday',i:'🎂',n:'Chien-Shiung Wu — Born 1912',x:'"First Lady of Physics." Disproved parity conservation (1957). Nobel oversight.',f:'Nuclear Physics'},
{m:11,d:2,t:'birthday',i:'🎂',n:'George Boole — Born 1815',x:'Boolean algebra — the math of logic gates, fundamental to computing.',f:'Mathematical Logic'},
{m:11,d:7,t:'birthday',i:'🎂',n:'Marie Curie — Born 1867',x:'Only person to win Nobels in TWO sciences: Physics (1903) and Chemistry (1911). Discovered polonium & radium.',f:'Radioactivity'},
{m:11,d:7,t:'birthday',i:'🎂',n:'C.V. Raman — Born 1888',x:'Raman Effect — inelastic light scattering. Nobel 1930. National Science Day (India) celebrates his discovery.',f:'Optics'},
{m:11,d:7,t:'birthday',i:'🎂',n:'Lise Meitner — Born 1878',x:'Co-discovered nuclear fission (1938). Nobel went to Hahn alone — greatest oversight in Nobel history. Element 109 = Meitnerium.',f:'Nuclear Physics'},
{m:11,d:8,t:'birthday',i:'🎂',n:'Edmond Halley — Born 1656',x:'Predicted his comet\'s return. Funded Newton\'s Principia. First weather map and magnetic charts.',f:'Astronomy'},
{m:11,d:9,t:'birthday',i:'🎂',n:'Hedy Lamarr — Born 1914',x:'Actress AND physicist. Co-invented frequency-hopping spread spectrum — basis of WiFi, Bluetooth, GPS.',f:'Communications'},
{m:11,d:10,t:'birthday',i:'🎂',n:'Mikhail Lomonosov — Born 1711',x:'"Leonardo of Russia." Conservation of mass before Lavoisier. Discovered Venus\'s atmosphere.',f:'Chemistry/Physics'},
{m:11,d:15,t:'birthday',i:'🎂',n:'William Herschel — Born 1738',x:'Discovered Uranus (1781) and infrared radiation (1800). Built largest telescopes of his era.',f:'Astronomy'},
{m:11,d:24,t:'birthday',i:'🎂',n:'Hideki Yukawa — Born 1907',x:'Predicted mesons mediating the strong force. Nobel 1949 — first Japanese Nobel laureate.',f:'Nuclear Physics'},
{m:11,d:27,t:'birthday',i:'🎂',n:'Anders Celsius — Born 1701',x:'Proposed the Celsius temperature scale (originally inverted).',f:'Thermometry'},
{m:12,d:3,t:'birthday',i:'🎂',n:'Jagadish Chandra Bose — Born 1858',x:'Pioneered microwave optics. Demonstrated radio before Marconi. Invented crescograph.',f:'Microwave Physics'},
{m:12,d:5,t:'birthday',i:'🎂',n:'Werner Heisenberg — Born 1901',x:'Uncertainty Principle: ΔxΔp ≥ ℏ/2. Matrix mechanics. Nobel 1932.',f:'Quantum Mechanics'},
{m:12,d:7,t:'birthday',i:'🎂',n:'Marie-Anne Paulze Lavoisier — Born 1758',x:'Essential collaborator with husband Antoine. Illustrated experiments and translated scientific texts.',f:'Chemistry'},
{m:12,d:9,t:'birthday',i:'🎂',n:'Fritz Haber — Born 1868',x:'Haber-Bosch process feeds ~4 billion people. Nobel 1918. Controversially directed chemical weapons in WWI.',f:'Chemistry'},
{m:12,d:10,t:'birthday',i:'🎂',n:'Ada Lovelace — Born 1815',x:'Wrote the first computer program for Babbage\'s Analytical Engine.',f:'Computing/Mathematics'},
{m:12,d:11,t:'birthday',i:'🎂',n:'Max Born — Born 1882',x:'Probabilistic interpretation of wave function (|ψ|²). Nobel 1954. Grandfather of Olivia Newton-John.',f:'Quantum Mechanics'},
{m:12,d:18,t:'birthday',i:'🎂',n:'J.J. Thomson — Born 1856',x:'Discovered the electron (1897). Nobel 1906. His students won 8 Nobel Prizes!',f:'Atomic Physics'},
{m:12,d:19,t:'birthday',i:'🎂',n:'Albert Michelson — Born 1852',x:'Measured speed of light. Michelson-Morley experiment disproved the aether. First American science Nobel (1907).',f:'Optics'},
{m:12,d:22,t:'birthday',i:'🎂',n:'Srinivasa Ramanujan — Born 1887',x:'Indian mathematical genius. ~3,900 results in infinite series and number theory. Died at 32.',f:'Mathematical Physics'},
{m:12,d:25,t:'birthday',i:'🎂',n:'Isaac Newton — Born 1642',x:'Laws of motion, universal gravitation, calculus, optics, Principia. Arguably the greatest scientist ever.',f:'Classical Physics'},
{m:12,d:27,t:'birthday',i:'🎂',n:'Johannes Kepler — Born 1571',x:'Three laws of planetary motion. Foundation for Newton\'s gravitational theory.',f:'Celestial Mechanics'},
{m:12,d:27,t:'birthday',i:'🎂',n:'Louis Pasteur — Born 1822',x:'Pasteurization, germ theory, vaccines for rabies and anthrax. Proved chirality. Saved millions.',f:'Chemistry/Microbiology'},
{m:12,d:29,t:'birthday',i:'🎂',n:'Charles Goodyear — Born 1800',x:'Discovered vulcanization of rubber (1839). Critical chemistry breakthrough for modern industry.',f:'Polymer Chemistry'},
{m:1,d:11,t:'birthday',i:'🎂',n:'Theodor Svedberg — Born 1884',x:'Nobel Chemistry 1926 for colloid chemistry and the ultracentrifuge.',f:'Chemistry'},
{m:3,d:7,t:'birthday',i:'🎂',n:'John Herschel — Born 1792',x:'Polymath: astronomer, chemist, photographer. Named 7 moons of Saturn. Catalogued thousands of stars.',f:'Astronomy/Chemistry'},
{m:4,d:5,t:'birthday',i:'🎂',n:'Joseph Lister — Born 1827',x:'Pioneered antiseptic surgery using carbolic acid. Applied chemistry to medicine.',f:'Chemistry/Medicine'},
{m:4,d:7,t:'birthday',i:'🎂',n:'Gérard Mourou — Born 1944',x:'Co-invented Chirped Pulse Amplification. Nobel 2018 with Donna Strickland. Highest-intensity lasers.',f:'Laser Physics'},
{m:4,d:14,t:'birthday',i:'🎂',n:'Christiaan Huygens — Born 1629',x:'Wave theory of light, discovered Saturn\'s rings and Titan, invented the pendulum clock.',f:'Wave Optics'},
{m:4,d:26,t:'birthday',i:'🎂',n:'Charles Richter — Born 1900',x:'Developed the Richter scale for earthquake magnitude.',f:'Geophysics'},
{m:5,d:6,t:'birthday',i:'🎂',n:'Max Perutz — Born 1914',x:'Determined hemoglobin structure via X-ray crystallography. Nobel Chemistry 1962.',f:'Biochemistry'},
{m:6,d:17,t:'birthday',i:'🎂',n:'William Crookes — Born 1832',x:'Discovered thallium, invented the Crookes tube (precursor to X-ray tubes).',f:'Chemistry/Physics'},
{m:7,d:12,t:'birthday',i:'🎂',n:'George Eastman — Born 1854',x:'Pioneered photographic film using chemistry. Founded Kodak.',f:'Chemistry/Optics'},
{m:7,d:31,t:'birthday',i:'🎂',n:'Primo Levi — Born 1919',x:'"The Periodic Table" — connecting chemical elements to human experience. Survived Auschwitz.',f:'Chemistry'},
{m:8,d:18,t:'birthday',i:'🎂',n:'Brook Taylor — Born 1685',x:'Taylor series expansion — one of the most useful tools in physics.',f:'Mathematical Physics'},
{m:9,d:20,t:'birthday',i:'🎂',n:'James Dewar — Born 1842',x:'Invented the Dewar flask (thermos), first liquefied hydrogen.',f:'Cryogenics'},
{m:10,d:12,t:'birthday',i:'🎂',n:'Hans von Euler-Chelpin — Born 1873',x:'Nobel Chemistry 1929 for fermentation enzymes.',f:'Biochemistry'},
{m:10,d:14,t:'birthday',i:'🎂',n:'Har Gobind Khorana — Born 1922',x:'Decoded genetic code, synthesized first artificial gene. Nobel 1968.',f:'Biochemistry'},
{m:11,d:14,t:'birthday',i:'🎂',n:'Frederick Banting — Born 1891',x:'Co-discovered insulin (1921). Nobel 1923. Saved millions of diabetics.',f:'Biochemistry'},
{m:11,d:30,t:'birthday',i:'🎂',n:'Andrew Huxley — Born 1917',x:'Nobel for nerve impulse transmission — applying physics to biology.',f:'Biophysics'},
{m:12,d:16,t:'birthday',i:'🎂',n:'Johann Wilhelm Ritter — Born 1776',x:'Discovered ultraviolet radiation (1801). Built first dry cell battery.',f:'Electrochemistry'},

// ── ADDITIONAL BIRTHDAYS ──
{m:1,d:3,t:'birthday',i:'🎂',n:'Lucretius — Born ~99 BC',x:'Roman philosopher who proposed atoms, void, and natural laws in "De Rerum Natura" centuries before modern science.',f:'Natural Philosophy'},
{m:2,d:3,t:'birthday',i:'🎂',n:'Robert Coleman Richardson — Born 1937',x:'Nobel 1996 for superfluidity in helium-3. Low-temperature physics pioneer.',f:'Condensed Matter'},
{m:2,d:22,t:'birthday',i:'🎂',n:'Robert Millikan — Born 1868',x:'Oil drop experiment measured electron charge. Nobel 1923. Also measured Planck\'s constant.',f:'Experimental Physics'},
{m:3,d:3,t:'birthday',i:'🎂',n:'Alexander Graham Bell — Born 1847',x:'Invented the telephone. Contributed to acoustics, optical telecommunications, and aeronautics.',f:'Acoustics'},
{m:3,d:27,t:'birthday',i:'🎂',n:'Wilhelm Röntgen — Born 1845',x:'Discovered X-rays (1895). First Nobel Prize in Physics (1901). Refused to patent his discovery.',f:'Physics'},
{m:4,d:3,t:'birthday',i:'🎂',n:'Meghnad Saha — Born 1893',x:'Saha ionization equation — fundamental to stellar astrophysics. Nominated for Nobel multiple times.',f:'Astrophysics'},
{m:4,d:20,t:'birthday',i:'🎂',n:'Charles Augustin de Coulomb — Born 1736',x:'Coulomb\'s law of electrostatic force. The coulomb (C) unit of charge.',f:'Electrostatics'},
{m:5,d:9,t:'birthday',i:'🎂',n:'Gaspard-Gustave de Coriolis — Born 1792',x:'Described the Coriolis effect — deflection of moving objects in rotating reference frames.',f:'Classical Mechanics'},
{m:7,d:6,t:'birthday',i:'🎂',n:'Irène Joliot-Curie — Born 1897',x:'Daughter of Marie Curie. Nobel Chemistry 1935 for artificial radioactivity.',f:'Nuclear Chemistry'},
{m:7,d:15,t:'birthday',i:'🎂',n:'APJ Abdul Kalam — Born 1931',x:'India\'s "Missile Man." Led ballistic missile and space programs. 11th President of India.',f:'Aerospace'},
{m:7,d:28,t:'birthday',i:'🎂',n:'Karl Popper — Born 1902',x:'Philosophy of science — falsifiability as the criterion of scientific theories.',f:'Philosophy of Science'},
{m:8,d:22,t:'birthday',i:'🎂',n:'Denis Papin — Born 1647',x:'Invented the pressure cooker and the first piston steam engine concept.',f:'Thermodynamics'},
{m:9,d:8,t:'birthday',i:'🎂',n:'Vikram Sarabhai — Born 1919',x:'"Father of the Indian Space Programme." Founded ISRO. Established IIM Ahmedabad.',f:'Space'},
{m:9,d:11,t:'birthday',i:'🎂',n:'James Jeans — Born 1877',x:'Jeans instability in astrophysics. Rayleigh-Jeans law in blackbody radiation.',f:'Astrophysics'},
{m:9,d:27,t:'birthday',i:'🎂',n:'Jacques-Alexandre-César Charles — Born 1746',x:'Charles\'s law: V/T = constant. First hydrogen balloon flight.',f:'Gas Physics'},
{m:10,d:8,t:'birthday',i:'🎂',n:'Ejnar Hertzsprung — Born 1873',x:'Hertzsprung-Russell diagram — classifying stars by luminosity and temperature.',f:'Astrophysics'},
{m:10,d:28,t:'birthday',i:'🎂',n:'Jonas Salk — Born 1914',x:'Developed first polio vaccine. Refused to patent: "Could you patent the sun?"',f:'Virology'},
{m:11,d:19,t:'birthday',i:'🎂',n:'Homi Jehangir Bhabha — Born 1909',x:'"Father of Indian Nuclear Programme." Founded TIFR and BARC. Bhabha scattering in QED.',f:'Nuclear Physics'},
{m:11,d:20,t:'birthday',i:'🎂',n:'Edwin Hubble — Born 1889',x:'Proved galaxies exist beyond the Milky Way. Hubble\'s law: universe is expanding.',f:'Astrophysics'},
{m:12,d:1,t:'birthday',i:'🎂',n:'Martin Heinrich Klaproth — Born 1743',x:'Discovered uranium, zirconium, and cerium. Pioneer of analytical chemistry.',f:'Chemistry'},
{m:12,d:28,t:'birthday',i:'🎂',n:'Arthur Eddington — Born 1882',x:'Confirmed general relativity via solar eclipse. Pioneered stellar structure theory.',f:'Astrophysics'},

// TYPES
// ═══════════════════════════════════════════════════
const T={
    astro:{l:'Astronomical',c:'#4f46e5',bg:'#eef2ff',fg:'#4338ca',e:'🌌'},
    birthday:{l:'Birthday',c:'#d97706',bg:'#fef9ee',fg:'#b45309',e:'🎂'},
    memorial:{l:'Memorial',c:'#dc2626',bg:'#fef2f2',fg:'#b91c1c',e:'🕯️'},
    achievement:{l:'Achievement',c:'#059669',bg:'#ecfdf5',fg:'#047857',e:'🏆'},
    moon:{l:'Lunar Phase',c:'#7c3aed',bg:'#f5f3ff',fg:'#6d28d9',e:'🌙'},
    eclipse:{l:'Eclipse',c:'#ea580c',bg:'#fff7ed',fg:'#c2410c',e:'🌒'},
    intl:{l:'Science Day',c:'#0284c7',bg:'#f0f9ff',fg:'#0369a1',e:'📡'},
};
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MA=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let cY=new Date().getFullYear(), cM=new Date().getMonth(), sel=null;
let flt=new Set(Object.keys(T)), q='';

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const fd=(y,m)=>new Date(y,m,1).getDay();

function getEv(m,d){
    return E.filter(e=>{
        if(d!==undefined?(e.m!==m+1||e.d!==d):e.m!==m+1) return false;
        if(!flt.has(e.t)) return false;
        if(q){let s=q.toLowerCase();return e.n.toLowerCase().includes(s)||e.x.toLowerCase().includes(s)||(e.f&&e.f.toLowerCase().includes(s));}
        return true;
    }).sort((a,b)=>a.d-b.d);
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════


function renderStats(){
    const cnt={};
    Object.keys(T).forEach(k=>cnt[k]=getEv(cM).filter(e=>e.t===k).length);
    document.getElementById('statsPills').innerHTML=Object.entries(T).filter(([k])=>cnt[k]>0).map(([k,v])=>
        `<div class="stat-pill"><div class="sp-dot" style="background:${v.c}"></div>${cnt[k]} ${v.l}</div>`
    ).join('');
}

function renderCal(){
    const g=document.getElementById('calGrid');
    g.innerHTML='';
    document.getElementById('monthLabel').textContent=`${MN[cM]} ${cY}`;

    const days=dim(cY,cM), f=fd(cY,cM), prev=dim(cY,cM-1);
    const now=new Date();
    const isToday=d=>now.getFullYear()===cY&&now.getMonth()===cM&&now.getDate()===d;

    // Calculate total rows needed
    const totalCells = f + days;
    const rows = Math.ceil(totalCells / 7);

    // Previous month
    for(let i=f-1;i>=0;i--){
        const c=document.createElement('div');
        c.className='cal-cell other';
        c.innerHTML=`<div class="cell-day">${prev-i}</div>`;
        g.appendChild(c);
    }

    // Current month
    for(let d=1;d<=days;d++){
        const c=document.createElement('div');
        c.className='cal-cell';
        if(isToday(d)) c.classList.add('today');
        if(sel===d) c.classList.add('selected');

        const evs=getEv(cM,d);
        const maxShow = rows <= 5 ? 3 : 2;
        let ehtml=evs.slice(0,maxShow).map(e=>`<div class="cell-ev c-${e.t}">${e.i} ${e.n.substring(0,28)}${e.n.length>28?'…':''}</div>`).join('');
        if(evs.length>maxShow) ehtml+=`<div class="cell-more">+${evs.length-maxShow} more</div>`;

        c.innerHTML=`<div class="cell-day">${d}</div><div class="cell-events">${ehtml}</div>`;
        c.addEventListener('click',()=>selDay(d));
        g.appendChild(c);
    }

    // Next month
    const rem=rows*7 - g.children.length;
    for(let i=1;i<=rem;i++){
        const c=document.createElement('div');
        c.className='cal-cell other';
        c.innerHTML=`<div class="cell-day">${i}</div>`;
        g.appendChild(c);
    }

    // Set grid rows
    g.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
}

function renderList(){
    const list=document.getElementById('evList');
    const evs=sel!==null?getEv(cM,sel):getEv(cM);

    document.getElementById('evCount').textContent=evs.length;
    document.getElementById('evListTitle').textContent=sel!==null?`${MN[cM]} ${sel}`:'All Events';

    if(!evs.length){
        list.innerHTML=`<div class="ev-empty"><span>📭</span>No events found</div>`;
        return;
    }

    list.innerHTML=evs.map((e,i)=>{
        const idx=E.indexOf(e);
        return `<div class="ev-card t-${e.t}" onclick="openM(${idx})">
            <div class="ev-date">${MA[e.m-1]} ${e.d} · ${T[e.t].l}${e.f?' · '+e.f:''}</div>
            <div class="ev-title">${e.i} ${e.n}</div>
            <div class="ev-desc">${e.x.substring(0,80)}${e.x.length>80?'…':''}</div>
        </div>`;
    }).join('');
}

function render(){renderCal();renderList();renderStats();}

// ═══════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════
function toggleMobileSidebar(){
    const sb=document.querySelector('.sidebar');
    const ov=document.getElementById('sidebarOverlay');
    sb.classList.toggle('mobile-open');
    ov.classList.toggle('show');
    document.body.style.overflow=sb.classList.contains('mobile-open')?'hidden':'';
}
function closeMobileSidebar(){
    document.querySelector('.sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('show');
    document.body.style.overflow='';
}
function selDay(d){
    sel=sel===d?null:d;
    render();
    // On mobile, auto-open sidebar to show day events
    if(sel && window.innerWidth<=1024){
        const sb=document.querySelector('.sidebar');
        const ov=document.getElementById('sidebarOverlay');
        sb.classList.add('mobile-open');
        ov.classList.add('show');
        document.body.style.overflow='hidden';
    }
}
function togFlt(f){flt.has(f)?flt.delete(f):flt.add(f);render();}
function changeMonth(d){cM+=d;if(cM<0){cM=11;cY--}if(cM>11){cM=0;cY++}sel=null;render();}
function goToday(){cY=new Date().getFullYear();cM=new Date().getMonth();sel=new Date().getDate();render();}

function openM(idx){
    const e=E[idx];
    document.getElementById('mIcon').textContent=e.i;
    document.getElementById('mTitle').textContent=e.n;
    document.getElementById('mType').innerHTML=`<span style="color:${T[e.t].c}">${T[e.t].e} ${T[e.t].l} — ${MN[e.m-1]} ${e.d}</span>`;
    let body=`<p>${e.x}</p>`;
    if(e.f) body+=`<div class="modal-field"><strong>Field:</strong> ${e.f}</div>`;
    document.getElementById('mBody').innerHTML=body;
    document.getElementById('mOverlay').classList.add('on');
}

function closeModal(){document.getElementById('mOverlay').classList.remove('on');}

// ═══════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════
let adminAuthenticated=false;

function adminAuth(){
    if(adminAuthenticated){ showAdmin(); return; }
    const pw=prompt('Enter admin password:');
    if(pw===null) return;
    if(pw==='baselius2024'){
        adminAuthenticated=true;
        showAdmin();
    } else {
        alert('Incorrect password.');
    }
}

function showAdmin(){
    populateAdminForm();
    renderCustomList();
    document.getElementById('adminOverlay').classList.add('on');
}

function closeAdmin(){
    document.getElementById('adminOverlay').classList.remove('on');
}

function populateAdminForm(){
    const ms=document.getElementById('aMonth');
    const ds=document.getElementById('aDay');
    const ts=document.getElementById('aType');
    if(!ms.children.length){
        MN.forEach((n,i)=>ms.innerHTML+=`<option value="${i+1}">${n}</option>`);
        for(let i=1;i<=31;i++) ds.innerHTML+=`<option value="${i}">${i}</option>`;
        Object.entries(T).forEach(([k,v])=>ts.innerHTML+=`<option value="${k}">${v.e} ${v.l}</option>`);
    }
}

function saveCustomEvent(){
    const m=parseInt(document.getElementById('aMonth').value);
    const d=parseInt(document.getElementById('aDay').value);
    const t=document.getElementById('aType').value;
    const i=document.getElementById('aIcon').value.trim()||T[t].e;
    const n=document.getElementById('aName').value.trim();
    const x=document.getElementById('aDesc').value.trim();
    const f=document.getElementById('aField').value.trim();
    if(!n){ alert('Please enter an event name.'); return; }
    if(!x){ alert('Please enter a description.'); return; }
    const ev={m,d,t,i,n,x,f,custom:true};
    const customs=JSON.parse(localStorage.getItem('astro_custom_events')||'[]');
    customs.push(ev);
    localStorage.setItem('astro_custom_events',JSON.stringify(customs));
    E.push(ev);
    // Reset form
    document.getElementById('aIcon').value='';
    document.getElementById('aName').value='';
    document.getElementById('aDesc').value='';
    document.getElementById('aField').value='';
    renderCustomList();
    render();
}

function deleteCustomEvent(index){
    const customs=JSON.parse(localStorage.getItem('astro_custom_events')||'[]');
    const removed=customs.splice(index,1)[0];
    localStorage.setItem('astro_custom_events',JSON.stringify(customs));
    // Remove from E array
    const ei=E.findIndex(e=>e.custom&&e.m===removed.m&&e.d===removed.d&&e.n===removed.n);
    if(ei!==-1) E.splice(ei,1);
    renderCustomList();
    render();
}

function loadCustomEvents(){
    const customs=JSON.parse(localStorage.getItem('astro_custom_events')||'[]');
    customs.forEach(ev=>{ ev.custom=true; E.push(ev); });
}

function renderCustomList(){
    const list=document.getElementById('customList');
    const customs=JSON.parse(localStorage.getItem('astro_custom_events')||'[]');
    if(!customs.length){
        list.innerHTML='<div class="custom-empty">No custom events yet</div>';
        return;
    }
    list.innerHTML=customs.map((e,i)=>{
        const tInfo=T[e.t]||{l:'Unknown',e:'❓'};
        return `<div class="custom-event-item">
            <span class="ce-icon">${e.i}</span>
            <div class="ce-info">
                <div class="ce-name">${e.n}</div>
                <div class="ce-meta">${MN[e.m-1]} ${e.d} · ${tInfo.l}${e.f?' · '+e.f:''}</div>
            </div>
            <button class="admin-delete-btn" onclick="deleteCustomEvent(${i})" title="Delete">delete</button>
        </div>`;
    }).join('');
}

function clearSearch(){
    document.getElementById('searchInput').value='';q='';
    document.getElementById('clearBtn').classList.remove('show');
    render();
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input',ev=>{
    q=ev.target.value;
    document.getElementById('clearBtn').classList.toggle('show',q.length>0);
    render();
});

document.addEventListener('keydown',ev=>{
    if(ev.target.tagName==='INPUT'||ev.target.tagName==='TEXTAREA') return;
    if(ev.key==='ArrowLeft') changeMonth(-1);
    if(ev.key==='ArrowRight') changeMonth(1);
    if(ev.key.toLowerCase()==='t') goToday();
    if(ev.key==='Escape'){ closeModal(); closeAdmin(); }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

loadCustomEvents();
render();
</script>
